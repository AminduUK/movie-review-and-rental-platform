<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>CineNest – Your Perfect Movie Night Awaits</title>
	<link
			href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap"
			rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap"
		  rel="stylesheet">
	<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- NAV -->
<nav>
	<a href="#" class="logo">CINE<span>NEST</span><span class="logo-dot"></span></a>
	<div class="nav-right">
		<a href="moviepage.html" class="nav-link">Browse</a>
		<a href="signin_page.html" class="nav-link">Sign In</a>
		<a href="signup_page.html" class="btn-join">Join Free</a>
	</div>
</nav>

<!-- HERO -->
<section class="hero">

	<div class="poster-collage" id="collage"></div>

	<div class="hero-content"> <!-- ← ADD THIS WRAPPER -->

		<h1 class="hero-title">
			YOUR PERFECT
			<span class="line-break"><em>MOVIE NIGHT</em></span>
			AWAITS
		</h1>

		<p class="hero-sub">
			Unlimited movie discoveries, trusted reviews, and easy rentals — all in one place.
		</p>

		<div class="search-wrap">
			<input class="search-input" id="searchBox" type="text"
				   placeholder="Search for a movie, genre, or year…" />
			<button class="search-btn" id="searchBtn">Search</button>
		</div>

		<p class="search-hint">Browse & Discover Thousands of Titles</p>

		<div class="hero-stats">
			<div class="stat-item">
				<div class="stat-number">Stripe</div>
				<div class="stat-label">Payments</div>
			</div>
			<div class="stat-item">
				<div class="stat-number">7-Day</div>
				<div class="stat-label">Rentals</div>
			</div>
			<div class="stat-item">
				<div class="stat-number">$2<span>.99</span></div>
				<div class="stat-label">Per Rental</div>
			</div>
		</div>

	</div> <!-- ← CLOSE WRAPPER -->

</section>

<!-- SEARCH RESULT MODAL -->
<div class="search-modal-overlay" id="searchModal">
	<div class="search-modal-card">
		<button class="search-modal-close" onclick="closeSearchModal()">✕</button>
		<div class="search-modal-backdrop" id="searchModalBackdrop"></div>
		<div class="search-modal-body">
			<div class="search-modal-poster-wrap">
				<img id="smPoster" src="" alt="Movie Poster" />
			</div>
			<div class="search-modal-info">
				<h2 id="smTitle"></h2>
				<div class="search-modal-meta">
					<span id="smYear"></span>
					<span class="dot">·</span>
					<span id="smRating"></span>
				</div>
				<p id="smOverview"></p>
				<div class="search-modal-cta">
					<a href="signin_page.html" class="btn-cta">🔑 Sign In to Rent</a>
					<a href="signup_page.html" class="btn-cta-secondary">Join CineNest Free</a>
				</div>
			</div>
		</div>
	</div>
</div>

<script src="js/app.js"></script>
</body>

</html>

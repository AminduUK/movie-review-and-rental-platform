<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineNest – Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
            href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap"
            rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/signin_page.css">
</head>

<body>

<div class="page-bg" id="pageBg"></div>

<nav>
    <a href="index.html" class="logo">CINE<span>NEST</span><span class="logo-dot"></span></a>
</nav>

<div class="page-wrap">
    <div class="auth-card">

        <!-- SIGN IN FORM -->
        <div id="panelSignin">
            <div class="auth-heading">Welcome<br>Back</div>
            <div class="auth-sub">Sign in to continue watching</div>

            <div class="api-error" id="siApiError">
                <span>⚠️</span><span id="siApiErrorMsg"></span>
            </div>

            <div class="form-group">
                <label class="form-label">Email</label>
                <input class="form-input" id="siEmail" type="email" placeholder="you@example.com"
                       autocomplete="email">
                <div class="error-msg" id="siEmailErr">Please enter a valid email.</div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-wrap">
                    <input class="form-input" id="siPassword" type="password" placeholder="Your password"
                           autocomplete="current-password" style="padding-right:44px"
                           onkeydown="if(event.key==='Enter') handleSignin()">
                    <button class="toggle-pw" onclick="togglePw('siPassword',this)" tabindex="-1">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
                             viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    </button>
                </div>
                <div class="error-msg" id="siPasswordErr">Password is required.</div>
            </div>

            <a href="#" class="forgot-link">Forgot password?</a>

            <button class="btn-submit" id="siBtn" onclick="handleSignin()">
                <div class="spinner" id="siSpinner"></div>
                <span id="siBtnText">Sign In</span>
            </button>

            <div class="terms-note">
                Don't have an account?
                <a href="signup_page.html">Sign up free</a>
            </div>
        </div>

        <!-- SUCCESS STATE -->
        <div class="success-state" id="successState">
            <div class="success-icon">🎬</div>
            <div class="success-title">Welcome Back!</div>
            <div class="success-sub" id="successMsg">Redirecting…</div>
        </div>

    </div>
</div>

<script src="js/signin_page.js"></script>
</body>

</html>
